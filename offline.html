<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Offline</title>

    <style>
      :root {
        color-scheme: light dark;

        --wa-green: #25d366;

        /* dark mode */
        --bg: #111b21;
        --card: #1f2c34;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e9edef;
        --muted: #8696a0;
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f8fa;
          --card: #ffffff;
          --border: rgba(18, 140, 126, 0.12);
          --text: #1f2d2a;
          --muted: #5f6f6b;
          --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .card {
        width: min(420px, 100%);
        padding: 32px 24px;
        border-radius: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--wa-green);
      }

      .icon svg {
        width: 38px;
        height: 38px;
        display: block;
        fill: #ffffff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.75rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 0.96rem;
        line-height: 1.6;
      }

      .hint {
        margin: 0;
        font-size: 0.84rem;
        color: var(--muted);
      }

      @media (max-width: 480px) {
        .card {
          padding: 28px 20px;
          border-radius: 16px;
        }

        .icon {
          width: 64px;
          height: 64px;
          margin-bottom: 18px;
        }

        .icon svg {
          width: 34px;
          height: 34px;
        }

        h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <main class="card" role="main" aria-labelledby="offline-title">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M19.05 4.94A9.93 9.93 0 0 0 12.02 2C6.5 2 2.02 6.48 2.02 12c0 1.77.46 3.5 1.34 5.03L2 22l5.12-1.34A9.95 9.95 0 0 0 12.02 22h.01c5.52 0 10-4.48 10-10 0-2.67-1.04-5.18-2.98-7.06ZM12.03 20.2a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.04.8.81-2.97-.2-.31A8.17 8.17 0 0 1 3.82 12c0-4.53 3.68-8.21 8.21-8.21 2.19 0 4.25.85 5.8 2.4a8.14 8.14 0 0 1 2.4 5.8c0 4.53-3.68 8.21-8.2 8.21Zm4.5-6.16c-.25-.13-1.47-.72-1.7-.8-.23-.08-.4-.13-.57.13-.17.25-.65.8-.8.96-.15.17-.3.19-.56.07-.25-.13-1.08-.4-2.05-1.27-.76-.68-1.27-1.52-1.42-1.78-.15-.25-.02-.39.11-.52.12-.12.25-.3.38-.44.13-.15.17-.25.25-.42.08-.17.04-.31-.02-.44-.06-.13-.57-1.37-.78-1.88-.21-.5-.42-.43-.57-.44h-.48c-.17 0-.44.06-.67.31-.23.25-.88.86-.88 2.1 0 1.23.9 2.42 1.02 2.58.13.17 1.77 2.7 4.3 3.79.6.26 1.07.41 1.44.52.61.19 1.16.16 1.6.1.49-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.15-1.18-.06-.1-.23-.16-.48-.29Z"
          />
        </svg>
      </div>

      <h1 id="offline-title">No internet connection</h1>

      <p>
        WhatsApp Web could not be loaded right now. Check your connection and
        try again.
      </p>

      <p class="hint">Reconnect to the internet to continue.</p>
    </main>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
